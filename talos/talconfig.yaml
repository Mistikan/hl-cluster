# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

clusterName: "home-kubernetes"
endpoint: https://192.168.88.202:6443

clusterPodNets:
  - "10.69.0.0/16"
clusterSvcNets:
  - "10.96.0.0/16"

additionalApiServerCertSans: &sans
  - ""
  - "127.0.0.1"
additionalMachineCertSans: *sans

# Disable built-in Flannel to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "anaconda"
    ipAddress: "192.168.88.202"
    installDiskSelector:
      serial: "50026B76862410D9"
    # talosctl ls /lib/modules/6.12.18-talos/extras
    kernelModules:
      - name: zfs
      # Внутри рутового контейнера mount -t debugfs none /sys/kernel/debug
      # И доступ к /sys/kernel/debug/pmc_core/ появится
      - name: intel_pmc_core
      # - name: it87
      #   parameters:
      #     - ignore_resource_conflict=1
      #     - force_id=0x8628
    # https://factory.talos.dev/?arch=amd64&board=undefined&bootloader=auto&cmdline-set=true&extensions=-&extensions=siderolabs%2Famdgpu&extensions=siderolabs%2Fi915&extensions=siderolabs%2Fintel-ucode&extensions=siderolabs%2Fnfsd&extensions=siderolabs%2Fnfsrahead&extensions=siderolabs%2Fzfs&platform=metal&secureboot=undefined&target=metal&version=1.12.6
    # Подбанило в России - ты знаешь какое зеркало можно заиспользовать
    # Есть ещё зеркало: talos.volta.cloud
    # talosImageURL: factory.talos.dev/installer/ff5675344ad6fbd0e24ca2abad5f2ee372c0f1005b8016572610bf5ebb0361a5
    talosImageURL: talos.volta.cloud/installer/ff5675344ad6fbd0e24ca2abad5f2ee372c0f1005b8016572610bf5ebb0361a5
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "18:c0:4d:e0:ab:b5"
        dhcp: false
        addresses:
          - "192.168.88.202/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "192.168.88.1"
        mtu: 1500
    schematic:
      customization:
        extraKernelArgs:
          # TODO: в идеале конечно не подавлять эти сообщения, но пока другого выхода нет
          - pci=noaer
        systemExtensions:
          # Примечание: если ты сюда добавишь extensions, то это не поможет, т.к. у тебя указан talosImageURL - в нем перечислены extensions
          officialExtensions:
            - siderolabs/amdgpu
            - siderolabs/i915
            - siderolabs/intel-ucode
            # - siderolabs/nut-client # TODO: включить, когда буду подключать UPS
            - siderolabs/zfs
            - siderolabs/nfsd
            - siderolabs/nfsrahead
    # extraManifests:
    patches:
      - "@./patches/anaconda/volumeconfig.yaml"

# Global patches
patches:
  - "@./patches/global/cluster-discovery.yaml"
  - "@./patches/global/containerd.yaml"
  - "@./patches/global/disable-search-domain.yaml"
  - "@./patches/global/dns.yaml"
  - "@./patches/global/hostdns.yaml"
  - "@./patches/global/kubelet.yaml"
  - "@./patches/global/ntp.yaml"
  - "@./patches/global/openebs-local.yaml"
  - "@./patches/global/sysctl.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/api-access.yaml"
    - "@./patches/controller/cluster.yaml"
    - "@./patches/controller/disable-admission-controller.yaml"
    - "@./patches/controller/etcd.yaml"

