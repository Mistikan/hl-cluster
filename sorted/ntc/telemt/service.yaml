---
apiVersion: v1
kind: Service
metadata:
  name: telemt
  namespace: ntc
spec:
  type: ClusterIP
  selector:
    app: telemt
  ports:
    - name: "https"
      protocol: TCP
      port: 443
      targetPort: 443
---
apiVersion: v1
kind: Service
metadata:
  name: "telemt-node-service"
  namespace: ntc
spec:
  type: NodePort
  selector:
    app: telemt
  ports:
    - name: "https"
      port: 443
      targetPort: 443
      nodePort: 30443
      protocol: TCP
