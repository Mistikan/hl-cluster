---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app bitmagnet
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  values:
    controllers:
      bitmagnet:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/bitmagnet-io/bitmagnet
              tag: v0.10.0
            args:
              - worker
              - run
              - --all
            env:
              TZ: Europe/Moscow
              TMDB_ENABLED: "false"
              PROCESSOR_CONCURRENCY: "3"
              DHT_CRAWLER_SCALING_FACTOR: "100"
              DHT_CRAWLER_SAVE_FILES_THRESHOLD: "1000"
              POSTGRES_HOST: "postgresql-bitmagnet"
              POSTGRES_PORT: "5432"
              POSTGRES_USER: bitmagnet
              POSTGRES_NAME: bitmagnet
              # POSTGRES_PASSWORD:
            resources:
              requests:
                cpu: 100m
                memory: 1000Mi
              limits:
                memory: 2Gi
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    service:
      app:
        controller: *app
        ports:
          http:
            port: 3333
