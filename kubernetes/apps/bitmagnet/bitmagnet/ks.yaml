---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bitmagnet
  namespace: bitmagnet
spec:
  interval: 1h
  path: ./kubernetes/apps/bitmagnet/bitmagnet/app
  # postBuild:
  #   substituteFrom:
  #     - name: cluster-secrets
  #       kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: bitmagnet
  wait: false
