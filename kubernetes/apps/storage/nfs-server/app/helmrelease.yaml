---
# IMPORTANT: добивайся, чтобы загружался модуль nfsd
# Проверь, что он находится в talos (версия ядра меняется)
# talosctl ls /lib/modules/6.18.24-talos/kernel/fs/nfsd/nfsd.ko - должен быть файл

# Монтирование:
# mkdir /tmp/abc
# sudo mount -t nfs4 -o proto=tcp,port=2049 192.168.88.102:/seagate-barracuda-2tb-pool-torrent-pvc /tmp/abc

# yaml-language-server: $schema=https://k8s-versioned-schemas.pages.dev/flux/2.8.6/helmrelease_v2.json?values=app-template/4.6.2
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-server
  namespace: storage
spec:
  interval: 1h
  maxHistory: 1
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: storage
  install:
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      nfs-server:
        strategy: Recreate
        pod:
          annotations:
            # k8s.v1.cni.cncf.io/networks: '[
            #         { "name": "lan",
            #           "ips": [ "192.168.88.50/24" ],
            #           "mac": "c2:b0:57:49:47:f1",
            #           "gateway": [ "192.168.88.1" ]
            #         }]'
          priorityClassName: nfs-critical
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsNonRoot: false
            seccompProfile: { type: Unconfined }
        containers:
          nfs-server:
            image:
              # Only latest tag is published and digest is overwritten each update so don't pin digest
              # e.g. node boots after update, latest@sha no longer exists, new update not merged == no nfs
              repository: quay.io/aminvakil/alpine-nfs-server
              tag: latest
            env:
              EXPORTS_MOUNTED: true
              NFS_THREADS: 128
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - "showmount -e localhost | grep -q /export"
              readiness: &probes
                enabled: true
                type: TCP
                port: 2049
                spec:
                  periodSeconds: 15
                  timeoutSeconds: 1
                  failureThreshold: 2
                  successThreshold: 1
              liveness: *probes
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              privileged: true
    service:
      nfs-server:
        controller: nfs-server
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          lbipam.cilium.io/ips: "192.168.88.102"
        ports:
          # IMPORTANT: смотри обмен со стороны клиента через tcpdump, может станет понятнее
          # rpcbind:
          #   port: 111
          nfs:
            port: 2049
    persistence:
      exports:
        type: configMap
        name: nfs-exports
        globalMounts:
          - path: /etc/exports
            subPath: exports
      fake-export:
        type: emptyDir
        globalMounts:
          - path: /export
      seagate-barracuda-2tb-pool-torrent-pvc:
        existingClaim: seagate-barracuda-2tb-pool-torrent-pvc
        globalMounts:
          - path: /export/seagate-barracuda-2tb-pool-torrent-pvc
      # media:
      #   existingClaim: media
      #   globalMounts:
      #     - path: /export/media
      # ssd:
      #   existingClaim: ssd-csi-pvc
      #   globalMounts:
      #     - path: /export/ssd
      # tank:
      #   existingClaim: tank-csi-pvc
      #   globalMounts:
      #     - path: /export/tank
