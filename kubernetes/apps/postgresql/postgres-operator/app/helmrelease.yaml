---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres-operator
spec:
  interval: 15m
  chart:
    spec:
      chart: postgres-operator
      version: 1.15.1
      sourceRef:
        kind: HelmRepository
        name: postgres-operator-charts
        namespace: postgresql
      interval: 15m
  install:
    createNamespace: false
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values: {}
