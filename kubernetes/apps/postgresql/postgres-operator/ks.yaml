---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgres-operator
spec:
  interval: 1h
  path: ./kubernetes/apps/postgresql/postgres-operator
  # postBuild:
  #   substituteFrom:
  #     - name: cluster-secrets
  #       kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: postgresql
  wait: false
