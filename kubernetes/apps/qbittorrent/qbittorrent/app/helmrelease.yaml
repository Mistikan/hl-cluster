---
# TODO: это должно быть через fluxcd, а не как сейчас
# https://github.com/onedr0p/home-ops/blob/main/kubernetes/apps/default/qbittorrent/app/helmrelease.yaml
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app qbittorrent
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: qbittorrent
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      qbittorrent:
        # TODO: поставить 1
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.1.4@sha256:bb82ad6668f8eda1d0fcce6c1341498bfa879155bb1295cd9d314a2c35c07a01
            # command: ["/bin/bash"]
            # args: ["-c", "sleep inf"]
            env:
              TZ: Europe/Moscow
              QBT_WEBUI_PORT: &port 80
              QBT_TORRENTING_PORT: &torrentPort 50413
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v2/app/version
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            # resources:
            #   requests:
            #     cpu: 100m
            #   limits:
            #     memory: 8Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: qbittorrent
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "192.168.88.103"
        ports:
          http:
            primary: true
            port: *port
          bittorrent:
            enabled: true
            port: *torrentPort
            protocol: TCP
    # route:
    #   app:
    #     hostnames:
    #       - "{{ .Release.Name }}.devbu.io"
    #       - qb.devbu.io
    #     parentRefs:
    #       - name: internal
    #         namespace: kube-system
    #         sectionName: https
    #     rules:
    #       - backendRefs:
    #           - name: *app
    #             port: *port
    persistence:
      config:
        existingClaim: qbittorrent
      # scripts:
      #   type: configMap
      #   name: qbittorrent-scripts
      #   defaultMode: 0775
      #   globalMounts:
      #     - readOnly: true
      # media-wd-green:
      #   type: hostPath
      #   hostPath: /var/mnt/zfs/wd_green_1tb_pool/torrent
      #   globalMounts:
      #     - path: /media/zfs/wd_green_1tb_pool
      #       # TODO: раскомментировать, когда скачаю всё и диск будет только для раздачи
      #       # readOnly: true
      # media-wd-blue:
      #   existingClaim: wd-blue-1tb-pool-torrent-pvc
      #   globalMounts:
      #     - path: /media/zfs/wd_blue_1tb_pool
      #       # TODO: раскомментировать, когда скачаю всё и диск будет только для раздачи
      #       # readOnly: true
      media-seagate-barracuda:
        type: "nfs"
        server: "nfs-server.storage"
        path: "/export/seagate-barracuda-2tb-pool-torrent-pvc"
        globalMounts:
          - path: "/media/zfs/seagate_barracuda_2tb_pool"
            # TODO: раскомментировать, когда скачаю всё и диск будет только для раздачи
            # readOnly: true
      tmp:
        type: emptyDir
