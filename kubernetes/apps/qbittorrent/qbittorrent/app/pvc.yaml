---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: openebs-zfs-kingston
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: seagate-barracuda-2tb-pool-torrent-pvc
spec:
  storageClassName: openebs-seagate-barracuda-2tb-pool
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi
